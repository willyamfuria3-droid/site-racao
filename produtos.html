<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Produtos - Casa de Ração</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

/* PRODUTOS */

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:20px;
padding:40px;
max-width:1100px;
margin:auto;
}

.produto{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
text-align:center;
}

.produto img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

.preco{
color:#27ae60;
font-weight:bold;
}

button{
background:#2ecc71;
border:none;
padding:8px 12px;
border-radius:20px;
color:white;
cursor:pointer;
}

/* RODAPÉ CARRINHO */

.rodape-carrinho{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#2f7d3b;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
box-shadow:0 -3px 10px rgba(0,0,0,0.3);
}

.total{
font-size:18px;
font-weight:bold;
}

.btn-pagar{
background:#27ae60;
border:none;
padding:10px 20px;
border-radius:20px;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<h1 style="text-align:center">Produtos</h1>

<div class="container">

<div class="produto">
<img src="https://images.unsplash.com/photo-1583511655857-d19b40a7a54e">
<h3>Ração Cachorro</h3>
<p class="preco">R$120</p>
<button onclick="addCarrinho(120)">Adicionar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba">
<h3>Ração Gato</h3>
<p class="preco">R$95</p>
<button onclick="addCarrinho(95)">Adicionar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1552728089-57bdde30beb3">
<h3>Ração Pássaros</h3>
<p class="preco">R$45</p>
<button onclick="addCarrinho(45)">Adicionar</button>
</div>

<div class="produto">
<img src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b">
<h3>Ração Filhotes</h3>
<p class="preco">R$150</p>
<button onclick="addCarrinho(150)">Adicionar</button>
</div>

</div>

<!-- RODAPÉ DO CARRINHO -->

<div class="rodape-carrinho">

<div>
🛒 Itens: <span id="itens">0</span>
</div>

<div class="total">
Total: R$ <span id="total">0</span>
</div>

<button class="btn-pagar" onclick="irPagamento()">
Pagar com Pix
</button>

</div>

<script>

let total = 0
let itens = 0

function addCarrinho(valor){

total += valor
itens++

document.getElementById("total").innerText = total
document.getElementById("itens").innerText = itens

}

function irPagamento(){

window.location.href="pagamento.html?total="+total

}

</script>

</body>
</html>
